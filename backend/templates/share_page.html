<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LexiFlow 听写音频</title>
    <meta name="description" content="LexiFlow 生成的听写音频，包含 {word_count} 个单词">
    <style>
        * {{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }}

        body {{
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }}

        .share-container {{
            background: white;
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
            padding: 40px 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }}

        .share-brand {{
            text-align: center;
            margin-bottom: 32px;
        }}

        .share-brand h1 {{
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }}

        .share-brand p {{
            color: #94a3b8;
            font-size: 0.85rem;
        }}

        .audio-section {{
            background: #f8fafc;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }}

        .audio-section audio {{
            width: 100%;
            border-radius: 12px;
            outline: none;
        }}

        .audio-section audio::-webkit-media-controls-panel {{
            background: #f1f5f9;
        }}

        .word-list {{
            margin-bottom: 24px;
        }}

        .word-list-title {{
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }}

        .word-tags {{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }}

        .word-tag {{
            display: inline-block;
            padding: 6px 14px;
            background: #f1f5f9;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #334155;
            transition: background 0.2s;
        }}

        .word-tag:hover {{
            background: #e2e8f0;
        }}

        .meta-info {{
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }}

        .meta-info .dot {{
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #cbd5e1;
        }}

        .actions {{
            display: flex;
            gap: 12px;
        }}

        .btn {{
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
        }}

        .btn-primary {{
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }}

        .btn-primary:hover {{
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }}

        .btn-secondary {{
            background: #f1f5f9;
            color: #475569;
        }}

        .btn-secondary:hover {{
            background: #e2e8f0;
        }}

        .footer {{
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }}

        .footer p {{
            font-size: 0.75rem;
            color: #cbd5e1;
        }}

        .footer a {{
            color: #667eea;
            text-decoration: none;
        }}

        .expired-container {{
            text-align: center;
            padding: 60px 32px;
        }}

        .expired-container .icon {{
            font-size: 3rem;
            margin-bottom: 16px;
        }}

        .expired-container h2 {{
            font-size: 1.3rem;
            color: #334155;
            margin-bottom: 8px;
        }}

        .expired-container p {{
            color: #94a3b8;
            font-size: 0.95rem;
        }}
    </style>
</head>
<body>
    <div class="share-container">
        {content}
    </div>
</body>
</html>
