<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LexiFlow 听写音频</title>
    <meta name="description" content="LexiFlow 生成的听写音频，包含 {word_count} 个单词">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {{
            --color-paper: #faf8f5;
            --color-paper-warm: #fffdf9;
            --color-olive: #3a8055;
            --color-olive-light: #4a9e69;
            --color-olive-pale: #edf5f0;
            --color-terracotta: #d4541a;
            --color-terracotta-pale: #fdf0eb;
            --color-ink: #2c2420;
            --color-ink-light: #4a4039;
            --color-text-secondary: #6b5f54;
            --color-text-muted: #9c8e82;
            --color-border: #e0d8cf;
            --color-border-light: #ece7e0;
            --color-gridline: rgba(61, 128, 85, 0.06);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'DM Mono', 'SF Mono', monospace;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-pill: 999px;
            --shadow-sm: 0 1px 3px rgba(44, 36, 32, 0.06), 0 1px 2px rgba(44, 36, 32, 0.04);
            --shadow-md: 0 4px 12px rgba(44, 36, 32, 0.08), 0 2px 4px rgba(44, 36, 32, 0.04);
            --shadow-lg: 0 8px 24px rgba(44, 36, 32, 0.10), 0 4px 8px rgba(44, 36, 32, 0.06);
        }}

        * {{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }}

        body {{
            font-family: var(--font-body);
            background-color: var(--color-paper);
            background-image:
                linear-gradient(var(--color-gridline) 1px, transparent 1px),
                linear-gradient(90deg, var(--color-gridline) 1px, transparent 1px);
            background-size: 28px 28px;
            color: var(--color-ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            -webkit-font-smoothing: antialiased;
        }}

        .share-container {{
            background: var(--color-paper-warm);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-xl);
            max-width: 480px;
            width: 100%;
            padding: 36px 32px;
            box-shadow: var(--shadow-lg);
            animation: fadeSlideUp 0.5s ease-out both;
        }}

        @keyframes fadeSlideUp {{
            from {{ opacity: 0; transform: translateY(16px); }}
            to {{ opacity: 1; transform: translateY(0); }}
        }}

        .share-brand {{
            text-align: center;
            margin-bottom: 28px;
        }}

        .share-brand h1 {{
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-ink);
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }}

        .share-brand h1 .accent-l {{ color: var(--color-terracotta); }}
        .share-brand h1 .accent-e {{ color: var(--color-olive); }}

        .share-brand-divider {{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }}

        .share-brand-line {{
            width: 36px;
            height: 1px;
            background: var(--color-border);
        }}

        .share-brand-dot {{
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--color-terracotta);
        }}

        .share-brand p {{
            font-family: var(--font-display);
            font-style: italic;
            color: var(--color-text-secondary);
            font-size: 0.95rem;
            margin-top: 10px;
        }}

        .audio-section {{
            background: var(--color-paper);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
            border-left: 4px solid var(--color-olive);
        }}

        .audio-section audio {{
            width: 100%;
            height: 44px;
            border-radius: var(--radius-pill);
            outline: none;
        }}

        .word-list {{
            margin-bottom: 24px;
        }}

        .word-list-title {{
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-ink);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }}

        .word-list-title::after {{
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--color-border), transparent);
            margin-left: 8px;
        }}

        .word-tags {{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }}

        .word-tag {{
            display: inline-block;
            padding: 5px 12px;
            background: var(--color-olive-pale);
            border: 1px solid rgba(58, 128, 85, 0.2);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-ink-light);
        }}

        .meta-info {{
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--color-text-muted);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }}

        .meta-info .dot {{
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--color-border);
        }}

        .actions {{
            display: flex;
            gap: 10px;
        }}

        .btn {{
            flex: 1;
            padding: 13px 16px;
            border-radius: var(--radius-pill);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }}

        .btn-primary {{
            background: var(--color-olive);
            color: white;
            box-shadow: 0 2px 8px rgba(61, 128, 85, 0.25), 0 1px 3px rgba(61, 128, 85, 0.15);
        }}

        .btn-primary:hover {{
            background: var(--color-olive-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(61, 128, 85, 0.3);
        }}

        .btn-primary:active {{
            transform: translateY(0) scale(0.98);
        }}

        .btn-secondary {{
            background: var(--color-paper);
            color: var(--color-ink);
            border: 1.5px solid var(--color-border);
        }}

        .btn-secondary:hover {{
            background: var(--color-olive-pale);
            border-color: var(--color-olive);
            color: var(--color-olive);
            transform: translateY(-1px);
        }}

        .footer {{
            text-align: center;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--color-border-light);
        }}

        .footer p {{
            font-size: 0.75rem;
            color: var(--color-text-muted);
        }}

        .footer a {{
            color: var(--color-olive);
            text-decoration: none;
            font-weight: 600;
        }}

        .expired-container {{
            text-align: center;
            padding: 48px 24px;
        }}

        .expired-container .icon {{
            font-size: 3rem;
            margin-bottom: 16px;
        }}

        .expired-container h2 {{
            font-family: var(--font-display);
            font-size: 1.4rem;
            color: var(--color-ink);
            margin-bottom: 8px;
        }}

        .expired-container p {{
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }}

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {{ width: 5px; }}
        ::-webkit-scrollbar-track {{ background: var(--color-paper); }}
        ::-webkit-scrollbar-thumb {{ background: var(--color-border); border-radius: 3px; }}

        /* ===== Text Selection ===== */
        ::selection {{ background: var(--color-olive-pale); color: var(--color-olive); }}

        @media (max-width: 480px) {{
            .share-container {{ padding: 28px 20px; }}
            .share-brand h1 {{ font-size: 1.5rem; }}
            .actions {{ flex-direction: column; }}
            .btn {{ justify-content: center; }}
        }}
    </style>
</head>
<body>
    <div class="share-container">
        {content}
    </div>
</body>
</html>
